name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: false

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: write
    uses: USA-RedDragon/reusable-actions/.github/workflows/goreleaser.yaml@0469a69979fb92bdb464851c248676016d2157b4 # v2.0.16
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
